name: Link Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --retry 3 -- ./**/*.md
          fail: true
