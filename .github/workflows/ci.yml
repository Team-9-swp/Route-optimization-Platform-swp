name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or SHA to deploy (used for manual redeploy/rollback)"
        required: false
        default: ""

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: optimizer
          POSTGRES_PASSWORD: optimizer
          POSTGRES_DB: optimizer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://optimizer:optimizer@localhost:5432/optimizer

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black pytest-cov bandit httpx

    - name: Run database migrations
      run: alembic upgrade head
      env:
        DATABASE_URL: postgresql+asyncpg://optimizer:optimizer@localhost:5432/optimizer

    - name: Lint with Ruff
      run: ruff check . --output-format=github

    - name: Format check with Black
      run: black --check .

    - name: Run Unit & Integration Tests with Coverage
      run: |
        pytest tests/ --ignore=tests/quality --ignore=tests/test_e2e.py -m "not slow" --cov=app --cov-report=xml --cov-report=term-missing --junitxml=backend-test-results.xml

    - name: Run Automated Quality Requirement Tests (QRTs)
      run: |
        pytest tests/quality/ -m "qrt" -q --junitxml=qrt-test-results.xml

    - name: Additional QA Check (Security Static Analysis)
      run: |
        # -ll ensures only Medium and High severity issues fail the build
        bandit -r app/ -ll

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          coverage.xml
          backend-test-results.xml
          qrt-test-results.xml

  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: frontend

    - name: Type check frontend
      run: npm run typecheck
      working-directory: frontend
        
    - name: Build frontend
      run: npm run build
      working-directory: frontend

  deploy:
    needs: [backend, frontend]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Build, start, and reconcile database schema
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --wait --remove-orphans
          # The app creates its schema on startup (init_db -> Base.metadata.create_all),
          # which creates the tables without recording an alembic version. Reconcile:
          # apply pending migrations on a fresh DB; if the tables already exist because
          # startup created them, stamp head so alembic tracks the current state and
          # future migrations apply cleanly.
          docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api alembic upgrade head \
            || docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api alembic stamp head

      - name: Post-deployment API health check (local)
        run: |
          sleep 15
          curl -fsS --retry 5 --retry-delay 5 http://localhost:8000/health
