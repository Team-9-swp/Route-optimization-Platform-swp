name: Bug Report
description: Report a bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria for the fix
    validations:
      required: true
